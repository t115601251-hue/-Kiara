<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250">
  <defs>
    <linearGradient id="icon-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffea79"/>
      <stop offset="60%" stop-color="#ffa234"/>
      <stop offset="100%" stop-color="#ff4b72"/>
    </linearGradient>
    <linearGradient id="icon-aurora" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="50%" stop-color="#9b51e0"/>
      <stop offset="100%" stop-color="#ff2a85"/>
    </linearGradient>
    <filter id="icon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="icon-ambient" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
    </filter>
  </defs>
  <circle cx="125" cy="125" r="82" fill="#9b51e0" opacity=".18" filter="url(#icon-ambient)"/>
  <g transform="translate(125,125)">
    <circle r="68" fill="#170c2b" fill-opacity=".52" stroke="#361b5c" stroke-width="1.5"/>
    <circle r="74" fill="none" stroke="url(#icon-aurora)" stroke-width="1" opacity=".45" stroke-dasharray="6 4"/>
    <polygon points="0,-48 41.57,-24 41.57,24 0,48 -41.57,24 -41.57,-24" fill="none" stroke="url(#icon-gold)" stroke-width="3.5" stroke-linejoin="round" filter="url(#icon-glow)"/>
    <polygon points="0,-39 33.77,-19.5 33.77,19.5 0,39 -33.77,19.5 -33.77,-19.5" fill="none" stroke="url(#icon-gold)" stroke-width="1" opacity=".6" stroke-linejoin="round"/>
    <g transform="translate(-8,-14)">
      <path d="M 0,0 L 0,28 L 8,21 L 14.5,33 L 19,30.5 L 12.5,19 L 21,19 Z" fill="url(#icon-gold)" filter="url(#icon-glow)"/>
      <path d="M 2,3 L 2,24 L 7.5,19 L 14,31 L 16.5,29.5 L 10.5,17.5 L 17,17.5 Z" fill="#ffffff" opacity=".95"/>
    </g>
  </g>
