<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE259"/>
      <stop offset="100%" stop-color="#FFA751"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="700" height="200" fill="#1A0510" rx="16"/>

  <circle cx="100" cy="100" r="80" fill="#700B3F" opacity="0.6" filter="url(#glow)"/>
  <circle cx="600" cy="50" r="100" fill="#50072D" opacity="0.5" filter="url(#glow)"/>

  <g transform="translate(40, 20)">
    <polygon points="60,25 107,52 107,108 60,135 13,108 13,52" fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
    <polygon points="60,15 116,47 116,113 60,145 4,113 4,47" fill="none" stroke="#9D174D" stroke-width="1.5" opacity="0.6"/>
    <polygon points="48,58 85,80 48,102" fill="url(#goldGrad)"/>
  </g>

  <g transform="translate(180, 115)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" letter-spacing="2">
      <tspan fill="#FBCFE8">MEDIA </tspan>
      <tspan fill="url(#goldGrad)">VAULT</tspan>
    </text>
    <text y="35" x="5" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#D946EF" letter-spacing="8">
      CREATORS ASSET LIBRARY
    </text>
  </g>

  <circle cx="630" cy="60" r="3" fill="#FFE259" filter="url(#glow)"/>
  <circle cx="650" cy="40" r="1.5" fill="#FFA751"/>
  <circle cx="170" cy="50" r="2" fill="#FFE259"/>
  <circle cx="580" cy="150" r="2.5" fill="#FBCFE8"/>
  
  <path d="M 600 140 L 620 140 L 630 160" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.7"/>
</svg>
